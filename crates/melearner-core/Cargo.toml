[package]
name = "melearner-core"
version = "0.1.0"
edition = "2024"
rust-version = "1.96.0"
license = "MIT"
publish = false

[features]
default = []
abi-test-hooks = []

[lib]
name = "melearner_core"
crate-type = ["rlib", "staticlib"]

[dependencies]
sha2 = "=0.10.9"
sqlx = { version = "=0.8.6", default-features = false, features = ["migrate", "runtime-tokio", "sqlite"] }

[dev-dependencies]
cbindgen = "=0.29.4"
tempfile = "=3.27.0"
tokio = { version = "=1.52.3", features = ["rt"] }
