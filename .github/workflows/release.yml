name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: release tag to package, for example v0.1.3
        required: true
        type: string

permissions:
  contents: write

# Windows and macOS release jobs must not be restored until their native
# in-window libmpv render hosts exist and pass packaged visual playback checks.
jobs:
  ensure-release:
    name: ensure release
    runs-on: ubuntu-22.04

    steps:
      - name: ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ inputs.tag }}" >/dev/null || \
            gh release create "${{ inputs.tag }}" --title "melearner ${{ inputs.tag }}" --notes "release assets for ${{ inputs.tag }}."

  linux-appimage:
    name: linux appimage
    runs-on: ubuntu-22.04
    needs: ensure-release

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: install pnpm
        run: npm install -g pnpm@11.10.0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend deps
        run: pnpm install --frozen-lockfile

      - name: build appimage
        env:
          NO_STRIP: "true"
        run: pnpm tauri build --bundles appimage

      - name: stage curated assets
        run: |
          mkdir -p dist/release
          cp src-tauri/target/release/bundle/appimage/*.AppImage dist/release/

      - name: upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag }}" dist/release/* --clobber

  linux-arch-package:
    name: linux arch package
    runs-on: ubuntu-22.04
    needs: ensure-release

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: build arch package
        run: |
          docker run --rm \
            -e RUNNER_UID="$(id -u)" \
            -e RUNNER_GID="$(id -g)" \
            -v "$PWD:/workspace" \
            -w /workspace \
            archlinux:base-devel bash -euo pipefail -c '
            pacman -Syu --noconfirm
            pacman -S --noconfirm cargo ffmpeg git gtk3 libayatana-appindicator libglvnd librsvg nodejs openssl patchelf pkgconf pnpm rust mpv webkit2gtk-4.1 xdg-utils
            groupadd -g "$RUNNER_GID" runner || true
            useradd -m -u "$RUNNER_UID" -g "$RUNNER_GID" builder
            su builder -c "cd /workspace && pnpm install --frozen-lockfile"
            su builder -c "cd /workspace && NO_STRIP=true pnpm tauri build --no-bundle --ci"
            su builder -c "cd /workspace/packaging/arch && makepkg -f --noconfirm"
          '

      - name: stage curated assets
        run: |
          mkdir -p dist/release
          cp packaging/arch/*.pkg.tar.zst dist/release/

      - name: upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag }}" dist/release/* --clobber
