name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    name: linux checks
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        run: npm install -g pnpm@11.10.0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install linux native-player deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libmpv-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            mpv \
            patchelf \
            pkg-config

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend deps
        run: pnpm install --frozen-lockfile

      - name: type-check
        run: npm run type-check

      - name: lint
        run: npm run lint

      - name: node boundary tests
        run: node --test lib/*boundary.test.mjs lib/dashboard-selectors.test.mjs

      - name: node data tests
        run: node --test --experimental-transform-types lib/course-identity.test.mjs lib/database-sqlite-fixture.test.mjs lib/stats.test.mjs

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
