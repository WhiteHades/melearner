name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  core-abi:
    name: rust core abi
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: test standalone rust core
        run: cargo test --locked --all-features --manifest-path crates/melearner-core/Cargo.toml

      - name: reject desktop-shell dependencies
        run: |
          set -euo pipefail
          dependencies="$(cargo tree --locked \
            --manifest-path crates/melearner-core/Cargo.toml \
            --all-features \
            --target all \
            --edges normal,build,dev \
            --prefix none \
            --format '{p}')"
          printf '%s\n' "$dependencies"
          offenders="$(printf '%s\n' "$dependencies" | grep -Ei '^(tauri|wry|webview|webkit)' || true)"
          if [[ -n "$offenders" ]]; then
            printf 'standalone core contains a Tauri/WebView/WebKit dependency:\n%s\n' "$offenders" >&2
            exit 1
          fi

      - name: run zig abi smoke
        run: scripts/test-core-abi.sh

  native-app-linux:
    name: native app linux
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev xauth xvfb

      - name: verify native app
        working-directory: native-app
        env:
          GTK_A11Y: none
          XDG_DATA_HOME: ${{ runner.temp }}/melearner-native-data
        run: |
          set -euo pipefail

          zig fmt --check build.zig src
          zig build test -Dplatform=null

          sdk_dir="$(find zig-pkg -mindepth 1 -maxdepth 1 -type d -name 'native_sdk-*' -print -quit)"
          test -f "$sdk_dir/build.zig"
          (cd "$sdk_dir" && zig build cli)
          cli="$PWD/$sdk_dir/zig-out/bin/native"
          "$cli" check . --strict

          zig build -Dplatform=linux -Doptimize=ReleaseSafe -Dautomation=true
          if readelf -dW zig-out/bin/melearner | grep -Eiq 'webkit|javascriptcore'; then
            echo "native app links a web runtime" >&2
            exit 1
          fi

          rm -rf "$XDG_DATA_HOME" .zig-cache/native-sdk-automation
          xvfb-run -a ./zig-out/bin/melearner >"$RUNNER_TEMP/melearner-native.log" 2>&1 &
          app_pid=$!
          cleanup() {
            kill "$app_pid" >/dev/null 2>&1 || true
            rm -rf .zig-cache/native-sdk-automation
          }
          trap cleanup EXIT

          if ! "$cli" automate assert --timeout-ms 90000 \
            'ready=true' \
            'gpu_nonblank=true' \
            'dispatch_errors=0' \
            'Your Library is empty'; then
            cat "$RUNNER_TEMP/melearner-native.log"
            exit 1
          fi

  linux:
    name: linux checks
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        run: npm install -g pnpm@11.10.0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: install frontend deps
        run: pnpm install --frozen-lockfile

      - name: type-check
        run: npm run type-check

      - name: lint
        run: npm run lint

      - name: node boundary tests
        run: node --test lib/*boundary.test.mjs lib/dashboard-selectors.test.mjs

      - name: node data tests
        run: npm run test:parity

      - name: build frontend assets
        run: pnpm build

      - name: arch rust cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/arch-cargo
            src-tauri/target
          key: arch-rust-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            arch-rust-${{ runner.os }}-

      - name: arch native-player rust checks
        run: |
          mkdir -p .cache/arch-cargo src-tauri/target
          docker run --rm \
            -e CARGO_HOME=/cargo-home \
            -e RUNNER_UID="$(id -u)" \
            -e RUNNER_GID="$(id -g)" \
            -v "$PWD/.cache/arch-cargo:/cargo-home" \
            -v "$PWD:/workspace" \
            -w /workspace \
            archlinux:base-devel bash -euo pipefail -c '
            pacman -Syu --noconfirm
            pacman -S --noconfirm cargo ffmpeg git gtk3 libayatana-appindicator libglvnd librsvg openssl patchelf pkgconf rust mpv webkit2gtk-4.1 xdg-utils
            groupadd -g "$RUNNER_GID" runner || true
            useradd -m -u "$RUNNER_UID" -g "$RUNNER_GID" builder
            su builder -c "cd /workspace && cargo test --manifest-path src-tauri/Cargo.toml"
            su builder -c "cd /workspace && cargo check --manifest-path src-tauri/Cargo.toml"
          '

  macos-compile:
    name: macos compile readiness
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        run: npm install -g pnpm@11.10.0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install macos native-player deps
        run: brew install mpv

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend deps
        run: pnpm install --frozen-lockfile

      - name: build frontend assets
        run: pnpm build

      - name: rust checks
        run: |
          export LIBRARY_PATH="$(brew --prefix mpv)/lib:${LIBRARY_PATH:-}"
          cargo test --locked --all-features --manifest-path crates/melearner-core/Cargo.toml --target-dir src-tauri/target
          cargo check --manifest-path src-tauri/Cargo.toml

  windows-compile:
    name: windows compile readiness
    runs-on: windows-latest

    steps:
      - name: preserve lf line endings
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4

      - name: install pnpm
        run: npm install -g pnpm@11.10.0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: install windows native-player deps
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-mpv
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-zlib

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: windows-gnu-native-player

      - name: install frontend deps
        run: pnpm install --frozen-lockfile

      - name: build frontend assets
        run: pnpm build

      - name: rust checks
        shell: msys2 {0}
        env:
          CARGO_BUILD_TARGET: x86_64-pc-windows-gnu
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: gcc
          CC_x86_64_pc_windows_gnu: gcc
          LIBRARY_PATH: /ucrt64/lib
          PKG_CONFIG_PATH: /ucrt64/lib/pkgconfig
          RUSTFLAGS: -L native=/ucrt64/lib
        run: |
          export PATH="/c/Users/runneradmin/.cargo/bin:/ucrt64/bin:$PATH"
          cargo test --locked --all-features --manifest-path crates/melearner-core/Cargo.toml --target-dir src-tauri/target
          cargo check --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-gnu
