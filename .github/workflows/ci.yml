name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    name: linux checks
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        run: npm install -g pnpm@11.10.0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: install frontend deps
        run: pnpm install --frozen-lockfile

      - name: type-check
        run: npm run type-check

      - name: lint
        run: npm run lint

      - name: node boundary tests
        run: node --test lib/*boundary.test.mjs lib/dashboard-selectors.test.mjs

      - name: node data tests
        run: node --test --experimental-transform-types lib/course-identity.test.mjs lib/database-sqlite-fixture.test.mjs lib/stats.test.mjs

      - name: build frontend assets
        run: pnpm build

      - name: arch native-player rust checks
        run: |
          docker run --rm -v "$PWD:/workspace" -w /workspace archlinux:base-devel bash -lc '
            pacman -Syu --noconfirm
            pacman -S --noconfirm ffmpeg git gtk3 libayatana-appindicator libglvnd libmpv librsvg openssl patchelf pkgconf rust webkit2gtk-4.1 xdg-utils
            useradd -m builder
            chown -R builder:builder /workspace
            su builder -c "cd /workspace && cargo test --manifest-path src-tauri/Cargo.toml"
            su builder -c "cd /workspace && cargo check --manifest-path src-tauri/Cargo.toml"
          '
