name: windows msi downloader

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-msi:
    name: windows msi artifact
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        run: npm install -g pnpm@11.10.0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: install windows native-player deps
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-mpv
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-sqlite3
            mingw-w64-ucrt-x86_64-zlib

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: windows-gnu-msi

      - name: wix cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\tauri\WixTools314
          key: wix-tools-314

      - name: install frontend deps
        run: pnpm install --frozen-lockfile

      - name: build no-bundle app
        shell: pwsh
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: C:\msys64\ucrt64\bin\gcc.exe
          CC_x86_64_pc_windows_gnu: C:\msys64\ucrt64\bin\gcc.exe
          LIBRARY_PATH: C:\msys64\ucrt64\lib
          PKG_CONFIG_PATH: C:\msys64\ucrt64\lib\pkgconfig
          RUSTFLAGS: -L native=C:\msys64\ucrt64\lib
        run: |
          $env:PATH = "C:\msys64\ucrt64\bin;$env:USERPROFILE\.cargo\bin;$env:PATH"
          pnpm tauri build --no-bundle --ci --target x86_64-pc-windows-gnu

      - name: stage native runtime DLLs
        shell: pwsh
        run: |
          pnpm stage:windows-runtime -- --app-bin "src-tauri\target\x86_64-pc-windows-gnu\release\melearner.exe"

      - name: bundle msi
        shell: pwsh
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: C:\msys64\ucrt64\bin\gcc.exe
          CC_x86_64_pc_windows_gnu: C:\msys64\ucrt64\bin\gcc.exe
          LIBRARY_PATH: C:\msys64\ucrt64\lib
          PKG_CONFIG_PATH: C:\msys64\ucrt64\lib\pkgconfig
          RUSTFLAGS: -L native=C:\msys64\ucrt64\lib
        run: |
          $env:PATH = "C:\msys64\ucrt64\bin;$env:USERPROFILE\.cargo\bin;$env:PATH"
          pnpm tauri bundle --bundles msi --ci --target x86_64-pc-windows-gnu
          $wixSource = "src-tauri\target\x86_64-pc-windows-gnu\release\wix\x64\main.wxs"
          if (!(Select-String -LiteralPath $wixSource -Pattern "libmpv-2.dll" -Quiet)) {
            throw "MSI WiX source does not include libmpv-2.dll"
          }
          if (!(Select-String -LiteralPath $wixSource -Pattern "avcodec-62.dll" -Quiet)) {
            throw "MSI WiX source does not include staged mpv dependency DLLs"
          }

      - name: upload msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: melearner-windows-msi-${{ github.sha }}
          path: src-tauri/target/x86_64-pc-windows-gnu/release/bundle/msi/*.msi
          retention-days: 14
