name: windows msi downloader

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-msi:
    name: windows msi artifact
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        run: npm install -g pnpm@11.10.0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: install rust gnu host
        shell: pwsh
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal
          "RUSTUP_TOOLCHAIN=stable-x86_64-pc-windows-gnu" >> $env:GITHUB_ENV

      - name: install windows native-player deps
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-mpv
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-sqlite3
            mingw-w64-ucrt-x86_64-zlib

      - name: resolve msys2 paths
        shell: pwsh
        run: |
          $candidates = @(
            "C:\msys64",
            "$env:RUNNER_TEMP\msys64"
          )
          $msysRoot = $candidates | Where-Object { Test-Path "$_\ucrt64\bin\gcc.exe" } | Select-Object -First 1
          if (!$msysRoot) {
            throw "could not find MSYS2 UCRT gcc.exe"
          }
          $ucrtBin = "$msysRoot\ucrt64\bin"
          $ucrtLib = "$msysRoot\ucrt64\lib"
          "MSYS2_ROOT=$msysRoot" >> $env:GITHUB_ENV
          "UCRT64_BIN=$ucrtBin" >> $env:GITHUB_ENV
          "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=$ucrtBin\gcc.exe" >> $env:GITHUB_ENV
          "CC_x86_64_pc_windows_gnu=$ucrtBin\gcc.exe" >> $env:GITHUB_ENV
          "LIBRARY_PATH=$ucrtLib" >> $env:GITHUB_ENV
          "PKG_CONFIG_PATH=$ucrtLib\pkgconfig" >> $env:GITHUB_ENV
          "RUSTFLAGS=-L native=$ucrtLib" >> $env:GITHUB_ENV
          "CARGO_PROFILE_RELEASE_OPT_LEVEL=1" >> $env:GITHUB_ENV
          "CARGO_PROFILE_RELEASE_CODEGEN_UNITS=16" >> $env:GITHUB_ENV
          "CARGO_PROFILE_RELEASE_LTO=false" >> $env:GITHUB_ENV

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: windows-gnu-native-player

      - name: wix cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\tauri\WixTools314
          key: wix-tools-314

      - name: install frontend deps
        run: pnpm install --frozen-lockfile

      - name: build no-bundle app
        shell: pwsh
        run: |
          $env:PATH = "$env:UCRT64_BIN;$env:USERPROFILE\.cargo\bin;$env:PATH"
          pnpm tauri build --no-bundle --ci --target x86_64-pc-windows-gnu

      - name: stage native runtime DLLs
        shell: pwsh
        run: |
          $env:PATH = "$env:UCRT64_BIN;$env:PATH"
          pnpm stage:windows-runtime -- --msys-root "$env:MSYS2_ROOT" --app-bin "src-tauri\target\x86_64-pc-windows-gnu\release\melearner.exe"

      - name: bundle msi
        shell: pwsh
        run: |
          $env:PATH = "$env:UCRT64_BIN;$env:USERPROFILE\.cargo\bin;$env:PATH"
          pnpm tauri bundle --bundles msi --ci --target x86_64-pc-windows-gnu
          $wixSource = "src-tauri\target\x86_64-pc-windows-gnu\release\wix\x64\main.wxs"
          if (!(Select-String -LiteralPath $wixSource -Pattern "libmpv-2.dll" -Quiet)) {
            throw "MSI WiX source does not include libmpv-2.dll"
          }
          if (!(Select-String -LiteralPath $wixSource -Pattern "avcodec-62.dll" -Quiet)) {
            throw "MSI WiX source does not include staged mpv dependency DLLs"
          }

      - name: prepare windows signing certificate
        shell: bash
        env:
          WINDOWS_CODE_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_PFX_BASE64 }}
          WINDOWS_CODE_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_CODE_SIGNING_PFX_PASSWORD }}
          WINDOWS_CODE_SIGNING_TIMESTAMP_URL: ${{ vars.WINDOWS_CODE_SIGNING_TIMESTAMP_URL }}
        run: |
          set -euo pipefail
          cert_dir="$(cygpath -u "$RUNNER_TEMP")/melearner-windows-signing"
          workspace="$(cygpath -u "$GITHUB_WORKSPACE")"
          msi_dir="$workspace/src-tauri/target/x86_64-pc-windows-gnu/release/bundle/msi"
          signing_info="$msi_dir/melearner-windows-msi-signing.txt"
          public_cert="$msi_dir/melearner-windows-msi-test-signing.cer"
          mkdir -p "$cert_dir"

          if [[ -n "${WINDOWS_CODE_SIGNING_PFX_BASE64:-}" || -n "${WINDOWS_CODE_SIGNING_PFX_PASSWORD:-}" ]]; then
            if [[ -z "${WINDOWS_CODE_SIGNING_PFX_BASE64:-}" || -z "${WINDOWS_CODE_SIGNING_PFX_PASSWORD:-}" ]]; then
              echo "WINDOWS_CODE_SIGNING_PFX_BASE64 and WINDOWS_CODE_SIGNING_PFX_PASSWORD must be set together." >&2
              exit 1
            fi

            echo "::add-mask::$WINDOWS_CODE_SIGNING_PFX_PASSWORD"
            printf '%s' "$WINDOWS_CODE_SIGNING_PFX_BASE64" | base64 -d > "$cert_dir/melearner-code-signing.pfx"
            {
              echo "WINDOWS_SIGNING_MODE=production"
              echo "WINDOWS_SIGNING_PFX=$(cygpath -w "$cert_dir/melearner-code-signing.pfx")"
              echo "WINDOWS_SIGNING_PFX_PASSWORD=$WINDOWS_CODE_SIGNING_PFX_PASSWORD"
              echo "WINDOWS_SIGNING_SUBJECT=trusted Windows code-signing certificate"
              if [[ -n "${WINDOWS_CODE_SIGNING_TIMESTAMP_URL:-}" ]]; then
                echo "WINDOWS_SIGNING_TIMESTAMP_URL=$WINDOWS_CODE_SIGNING_TIMESTAMP_URL"
              fi
            } >> "$GITHUB_ENV"
            {
              echo "mode=production"
              echo "certificate=WINDOWS_CODE_SIGNING_PFX_BASE64"
              echo "timestamp_url=${WINDOWS_CODE_SIGNING_TIMESTAMP_URL:-}"
            } > "$signing_info"
            exit 0
          fi

          pfx_password="$(openssl rand -hex 16)"
          echo "::add-mask::$pfx_password"
          cat > "$cert_dir/openssl-code-signing.cnf" <<'EOF'
          [ req ]
          distinguished_name = req_distinguished_name
          x509_extensions = v3_req
          prompt = no

          [ req_distinguished_name ]
          CN = melearner Windows MSI test artifact

          [ v3_req ]
          basicConstraints = critical,CA:true
          keyUsage = critical,digitalSignature
          extendedKeyUsage = codeSigning
          EOF
          openssl req -x509 -newkey rsa:2048 -sha256 -nodes -days 14 -keyout "$cert_dir/melearner-test-signing.key" -out "$cert_dir/melearner-test-signing.pem" -config "$cert_dir/openssl-code-signing.cnf"
          openssl pkcs12 -export -out "$cert_dir/melearner-test-signing.pfx" -inkey "$cert_dir/melearner-test-signing.key" -in "$cert_dir/melearner-test-signing.pem" -passout "pass:$pfx_password"
          openssl x509 -in "$cert_dir/melearner-test-signing.pem" -outform DER -out "$public_cert"
          {
            echo "WINDOWS_SIGNING_MODE=test"
            echo "WINDOWS_SIGNING_PFX=$(cygpath -w "$cert_dir/melearner-test-signing.pfx")"
            echo "WINDOWS_SIGNING_PFX_PASSWORD=$pfx_password"
            echo "WINDOWS_SIGNING_PUBLIC_CERT=$(cygpath -w "$public_cert")"
            echo "WINDOWS_SIGNING_SUBJECT=CN=melearner Windows MSI test artifact"
            echo "WINDOWS_SIGNING_ALLOW_UNTRUSTED_ROOT=true"
          } >> "$GITHUB_ENV"
          {
            echo "mode=test"
            echo "certificate=per-run self-signed test certificate"
            echo "public_certificate=melearner-windows-msi-test-signing.cer"
          } > "$signing_info"

      - name: sign msi
        shell: powershell
        timeout-minutes: 3
        run: |
          $signArgs = @{
            MsiDirectory = "src-tauri\target\x86_64-pc-windows-gnu\release\bundle\msi"
            PfxPath = "$env:WINDOWS_SIGNING_PFX"
            PfxPassword = "$env:WINDOWS_SIGNING_PFX_PASSWORD"
            Subject = "$env:WINDOWS_SIGNING_SUBJECT"
          }
          if ($env:WINDOWS_SIGNING_PUBLIC_CERT) {
            $signArgs.PublicCertPath = "$env:WINDOWS_SIGNING_PUBLIC_CERT"
          }
          if ($env:WINDOWS_SIGNING_TIMESTAMP_URL) {
            $signArgs.TimestampUrl = "$env:WINDOWS_SIGNING_TIMESTAMP_URL"
          }
          if ($env:WINDOWS_SIGNING_ALLOW_UNTRUSTED_ROOT -eq "true") {
            $signArgs.AllowUntrustedRoot = $true
          }
          .\scripts\sign-windows-msi.ps1 @signArgs

      - name: upload signed msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: melearner-windows-signed-msi-${{ github.sha }}
          path: |
            src-tauri/target/x86_64-pc-windows-gnu/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-gnu/release/bundle/msi/melearner-windows-msi-test-signing.cer
            src-tauri/target/x86_64-pc-windows-gnu/release/bundle/msi/melearner-windows-msi-signing.txt
          retention-days: 14
