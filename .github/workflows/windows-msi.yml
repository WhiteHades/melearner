name: windows msi downloader

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-msi:
    name: windows msi artifact
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        run: npm install -g pnpm@11.10.0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: install rust gnu host
        shell: pwsh
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal
          "RUSTUP_TOOLCHAIN=stable-x86_64-pc-windows-gnu" >> $env:GITHUB_ENV

      - name: install windows native-player deps
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-mpv
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-sqlite3
            mingw-w64-ucrt-x86_64-zlib

      - name: resolve msys2 paths
        shell: pwsh
        run: |
          $candidates = @(
            "C:\msys64",
            "$env:RUNNER_TEMP\msys64"
          )
          $msysRoot = $candidates | Where-Object { Test-Path "$_\ucrt64\bin\gcc.exe" } | Select-Object -First 1
          if (!$msysRoot) {
            throw "could not find MSYS2 UCRT gcc.exe"
          }
          $ucrtBin = "$msysRoot\ucrt64\bin"
          $ucrtLib = "$msysRoot\ucrt64\lib"
          "MSYS2_ROOT=$msysRoot" >> $env:GITHUB_ENV
          "UCRT64_BIN=$ucrtBin" >> $env:GITHUB_ENV
          "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=$ucrtBin\gcc.exe" >> $env:GITHUB_ENV
          "CC_x86_64_pc_windows_gnu=$ucrtBin\gcc.exe" >> $env:GITHUB_ENV
          "LIBRARY_PATH=$ucrtLib" >> $env:GITHUB_ENV
          "PKG_CONFIG_PATH=$ucrtLib\pkgconfig" >> $env:GITHUB_ENV
          "RUSTFLAGS=-L native=$ucrtLib" >> $env:GITHUB_ENV
          "CARGO_PROFILE_RELEASE_OPT_LEVEL=1" >> $env:GITHUB_ENV
          "CARGO_PROFILE_RELEASE_CODEGEN_UNITS=16" >> $env:GITHUB_ENV
          "CARGO_PROFILE_RELEASE_LTO=false" >> $env:GITHUB_ENV

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: windows-gnu-native-player

      - name: wix cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\tauri\WixTools314
          key: wix-tools-314

      - name: install frontend deps
        run: pnpm install --frozen-lockfile

      - name: build no-bundle app
        shell: pwsh
        run: |
          $env:PATH = "$env:UCRT64_BIN;$env:USERPROFILE\.cargo\bin;$env:PATH"
          pnpm tauri build --no-bundle --ci --target x86_64-pc-windows-gnu

      - name: stage native runtime DLLs
        shell: pwsh
        run: |
          $env:PATH = "$env:UCRT64_BIN;$env:PATH"
          pnpm stage:windows-runtime -- --msys-root "$env:MSYS2_ROOT" --app-bin "src-tauri\target\x86_64-pc-windows-gnu\release\melearner.exe"

      - name: bundle msi
        shell: pwsh
        run: |
          $env:PATH = "$env:UCRT64_BIN;$env:USERPROFILE\.cargo\bin;$env:PATH"
          pnpm tauri bundle --bundles msi --ci --target x86_64-pc-windows-gnu
          $wixSource = "src-tauri\target\x86_64-pc-windows-gnu\release\wix\x64\main.wxs"
          if (!(Select-String -LiteralPath $wixSource -Pattern "libmpv-2.dll" -Quiet)) {
            throw "MSI WiX source does not include libmpv-2.dll"
          }
          if (!(Select-String -LiteralPath $wixSource -Pattern "avcodec-62.dll" -Quiet)) {
            throw "MSI WiX source does not include staged mpv dependency DLLs"
          }

      - name: upload msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: melearner-windows-msi-${{ github.sha }}
          path: src-tauri/target/x86_64-pc-windows-gnu/release/bundle/msi/*.msi
          retention-days: 14
